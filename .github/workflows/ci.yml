name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint & Coding Standards
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer, phpcs

      - name: Install dependencies
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require drupal/coder

      - name: PHP Lint
        run: find . -name '*.php' -o -name '*.module' -o -name '*.install' | grep -v vendor | xargs -L1 php -l

      - name: PHPCS (Drupal standard)
        run: |
          export PATH="$PATH:$HOME/.composer/vendor/bin"
          phpcs --standard=Drupal,DrupalPractice --extensions=php,module,inc,install --ignore=vendor,node_modules .

